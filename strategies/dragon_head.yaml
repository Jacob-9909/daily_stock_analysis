# Dragon Head Strategy / 선도주 전략
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: 선도주 전략
description: 섹터 로테이션에서 선도주 식별. 섹터 시작 또는 업종 촉매 발생 시 적용합니다.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news

instructions: |
  **선도주 전략 (Dragon Head Strategy)**

  평가 기준:

  1. **섹터 선도 지위**:
     - `get_sector_rankings`으로 해당 종목이 속한 섹터가 최근 상승률 상위권인지 확인.
     - 해당 종목이 섹터 시작 주기에서 먼저 상승하거나 상한가를 기록했는지 확인.

  2. **회전율과 모멘텀** (매매 철학 7: 강세 추세주 조건 완화):
     - `get_realtime_quote`으로 회전율 확인. 선도주 회전율은 보통 > 5%.
     - 거래량 비율 > 1.5는 활발한 거래 관심 표시.

  3. **상대 강도**:
     - 개별 종목 등락률과 섹터 평균 비교.
     - 진정한 선도주는 상승일에 섹터보다 2% 이상 앞서야 함.

  4. **뉴스 촉매**:
     - `search_stock_news`으로 섹터 수준 촉매 (정책, 이벤트, 실적) 검색.
     - 선도주 장세는 보통 섹터 전반 촉매와 동반됨.

  5. **이격률 확인** (매매 철학 1: 엄격한 진입):
     - 선도주는 이격률 최대 7%까지 완화 가능하나, 10% 초과는 여전히 주의.

  평가 점수 조정:
  - 선도주 확인: sentiment_score +10
  - 섹터가 활발한 로테이션 기간 중: 추가 +5
  - `buy_reason`에 "선도주 전략" 판단 결과 명시.
