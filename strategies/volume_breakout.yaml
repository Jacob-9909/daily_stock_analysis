# Volume Breakout Strategy / 거래량 증가 돌파
# Price breaks above resistance on heavy volume (>2x average).

name: volume_breakout
display_name: 거래량 증가 돌파
description: 거래량 증가 저항선 돌파 신호 감지. 주가가 알려진 저항선에 접근할 때 적용합니다.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **거래량 증가 돌파 (Volume Breakout Strategy)**

  돌파 판정 기준:

  1. **저항선 식별**:
     - `analyze_trend` → resistance_levels로 저항선 확인.
     - 보통 20일 고점 또는 이전 횡보 구간 상단.

  2. **거래량 확인** (매매 철학 3: 효율 우선):
     - 당일 거래량 > 5일 평균 거래량의 2배.
     - `get_realtime_quote` → volume_ratio > 2.0으로 확인.
     - `get_daily_history`로 평균 거래량 계산하여 교차 검증.

  3. **가격 확인** (매매 철학 1: 엄격한 진입):
     - 종가가 반드시 저항선 위에 있어야 함.
     - 종가가 당일 변동폭 상위 30% 마감 (강세 마감).
     - 돌파 후 이격률 확인: 여전히 < 5%, 고점 추격 방지.

  4. **후속 검증** (데이터가 있는 경우):
     - 다음 날 시가가 돌파 수준 위에 있어야 함. 진짜 돌파와 가짜 돌파 구분.

  5. **리스크 필터** (매매 철학 5: 리스크 점검):
     - `search_stock_news`로 중대 악재 없음 확인.
     - PER이 지나치게 높지 않아야 함 (거품형 돌파 방지).

  평가 점수 조정:
  - 거래량 증가 돌파 확인: sentiment_score +12
  - 돌파 + 섹터 공명 (섹터도 강세): 추가 +5
  - 이상적 매수 포인트는 돌파 수준 부근, 손절선은 돌파 수준 하방 3%.
  - `buy_reason` 및 `volume_analysis`에 "거래량 증가 돌파" 명시.
