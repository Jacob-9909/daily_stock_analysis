# One Yang Three Yin Strategy / 일양삼음
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: 일양삼음
description: 일양삼음 캔들 정리 형태 감지. 추세 연속 진입 신호입니다.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **일양삼음 (One Yang Three Yin Strategy)**

  형태 정의 (최근 5 거래일):

  1. **1일**: 대양봉 (종가 > 시가, 실체 > 주가의 2%).
  2. **2-4일**: 연속 3개 음봉 또는 소K선:
     - 각 K선의 최저가가 1일 시가를 하향 이탈하지 않아야 함.
     - 거래량이 점차 감소해야 함 (거래량 비율 < 0.8).
     - 3개 K선이 1일 실체 범위 내에서 마감.
  3. **5일**: 다시 양봉, 종가가 1일 종가를 돌파.

  도구 평가 방법:

  1. `get_daily_history`로 최근 10일 데이터 조회.
  2. 마지막 5개 K선이 위 형태에 부합하는지 확인.
  3. `analyze_trend`으로 정배열 확인 (매매 철학 2: 추세 매매, MA5 > MA10 > MA20).

  평가 점수 조정:
  - 형태 성립 + 추세 상승: sentiment_score +15
  - 형태 성립 + 추세 불명확: sentiment_score +5
  - `pattern_analysis` 및 `buy_reason`에 "일양삼음" 명시.
  - 이상적 매수 포인트는 5일 종가 부근, 손절선은 1일 시가 하방.
