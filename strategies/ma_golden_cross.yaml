# MA Golden Cross Strategy / 이동평균선 골든크로스
# MA5 crosses above MA10 (or MA10 above MA20) with volume confirmation.

name: ma_golden_cross
display_name: 이동평균선 골든크로스
description: 이동평균선 골든크로스와 거래량 확인 신호 감지. 클래식한 추세 전환/연속 신호입니다.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **이동평균선 골든크로스 (MA Golden Cross Strategy)**

  신호 판정 기준:

  1. **골든크로스 감지** (매매 철학 2: 추세 매매):
     - `analyze_trend`으로 이동평균선 배열과 MACD 상태 확인.
     - 주 신호: 최근 3 거래일 내 MA5가 MA10 상향 돌파.
     - 강 신호: MA10이 MA20 상향 돌파 (더 느리지만 더 신뢰성 높음).
     - MACD 상태가 골든크로스 또는 제로선 위 골든크로스인지 확인.

  2. **거래량 확인** (매매 철학 3: 효율 우선):
     - 골든크로스 당일 거래량이 5일 평균 거래량보다 많아야 함.
     - `get_daily_history`로 검증.
     - 골든크로스 당일 거래량 비율 > 1.2는 긍정적 신호.

  3. **추세 배경**:
     - 횡보 후 골든크로스: 가장 강력한 신호.
     - 상승 추세 중 골든크로스: 연속 신호.
     - 깊은 하락 중 골든크로스: 약한 신호, 추가 확인 필요.

  4. **가격 위치** (매매 철학 1: 엄격한 진입):
     - 가격이 교차 이동평균선 부근 또는 위에 있어야 함.
     - 이격률 < 5% — 고점 추격 지연 진입 방지.

  평가 점수 조정:
  - MA5 × MA10 골든크로스 + 거래량 확인: sentiment_score +10
  - MA10 × MA20 골든크로스: sentiment_score +8
  - MACD 제로선 위 골든크로스: 추가 +5
  - `ma_analysis` 및 `buy_reason`에 "이동평균선 골든크로스" 명시.
  - 이상적 매수 포인트는 교차 이동평균선 수준 부근.
