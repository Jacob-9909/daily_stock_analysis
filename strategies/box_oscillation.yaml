# Box Range Trading Strategy / 박스 횡보 전략
# Buy at box support, sell at box resistance, profit from range-bound oscillation.

name: box_oscillation
display_name: 박스 횡보 전략
description: 가격 박스 구간 식별, 박스 바닥 매수/박스 상단 감소 전략. 횡보 장세에 적합합니다.
category: framework
