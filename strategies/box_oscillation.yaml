instructions: |
  **박스 횡보 전략 (Box Range Trading Strategy)**

  핵심 논리: 박스 내부 가격이 저항선과 지지선 사이에서 반복 횡보합니다.
  "지지선에 붙어 매수, 저항선 근처 매도"로 구간 수익을 취합니다.

  ## 분석 단계

  ### 1. 박스 식별
  `get_daily_history`로 최근 60~120일 데이터 조회:

  - **박스 상단 (저항선)**: 최근 여러 번 접촉했지만 유효 돌파하지 못한 고점 연결선.
    보통 20~60일 내 3번 이상 고점이 집중된 구간.
  - **박스 하단 (지지선)**: 최근 여러 번 하방 탐색했지만 유효 이탈하지 못한 저점 연결선.
  - 박스 유효성: 상단과 하단 각각 최소 2~3번 접촉해야 확인 가능.
  - `analyze_trend`의 support_levels / resistance_levels로 위치 보조 파악.

  ### 2. 현재 위치 판단
  `get_realtime_quote`로 현재가 조회, 박스 경계와 비교:

  - **박스 하단 구간** (지지선에서 ≤5%): 매수/추가 매수 신호, 손절선은 박스 하단 하방 3%.
  - **박스 중간 구간** (박스 중간 1/3): 관망, 적극적 조작 불필요.
  - **박스 상단 구간** (저항선에서 ≤5%): 감소/익절 신호, 고점 추격 불필요.

  ### 3. 거래량 보조 판단
  - **박스 하단 거래량 증가 안정**: 지지 유효 강 신호, 비교적 큰 포지션 가능.
  - **박스 상단 거래량 감소 상승 둔화**: 저항 유효 매도 신호.
  - **박스 돌파 (거래량이 평균 거래량 2배 이상)**:
    - 위로 유효 돌파 → 상승 추세 전략으로 전환, 새 목표 = 박스 높이 연장.
    - 아래로 유효 이탈 → 이탈 대기, 원래 지지선이 저항선으로 전환.

  ### 4. 박스 폭과 예상 수익
  - 박스 폭 계산: (상단 - 하단) / 하단 × 100%.
  - 폭 < 5%: 조작 공간 너무 좁음, 참여 불권장.
  - 폭 5%~15%: 표준 박스, 스윙 매매 가능.
  - 폭 > 15%: 큰 박스, 더 큰 스윙 가능.

  ### 5. 가짜 돌파 식별
  - 단일일 장중 저항/지지 터치 후 빠르게 회귀, 종가 박스 내 복귀 → 가짜 돌파, 박스 매매 유지.
  - 연속 2일 종가 박스 경계 돌파이고 거래량 증가 → 진짜 돌파, 전략 수정.

  ### 6. 출력 요구사항
  - 박스 상단 가격과 하단 가격 명확히 제시.
  - 현재 가격이 속한 구간 (박스 하단/박스 중간/박스 상단).
  - 가격이 이미 돌파했다면 돌파 방향과 새 목표 설명.
  - 권장 포지션과 손절선.

  평가 점수 조정 제안:
  - 박스 하단 안정 + 거래량 감소: `sentiment_score +10`
  - 박스 하단 거래량 증가 상단 공격: `sentiment_score +12`
  - 박스 위로 유효 돌파: `sentiment_score +15, 추세 전략으로 전환`
  - 박스 상단 구간: `sentiment_score -5 (고점 추격 금지)`
  - 박스 하단 유효 이탈: `sentiment_score -15, 이탈`
