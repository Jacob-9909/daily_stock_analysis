# Shrink Volume Pullback Strategy / 거래량 감소 되돌림
# Volume shrinks during pullback to MA5/MA10, then price bounces.

name: shrink_pullback
display_name: 거래량 감소 되돌림
description: 이동평균선 지지선 되돌림 신호 감지. 추세 연속의 이상적인 진입 포인트입니다.
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **거래량 감소 되돌림 (Shrink Volume Pullback Strategy)**

  진입 판정 기준:

  1. **전제 조건** (매매 철학 2: 추세 매매):
     - 종목이 상승 추세여야 함 (MA5 > MA10 > MA20).
     - `analyze_trend`으로 정배열 확인.

  2. **되돌림 감지** (매매 철학 4: 매수 타이밍 선호):
     - `get_daily_history` 및 `get_realtime_quote` 사용.
     - 가격이 MA5 부근 (오차 1% 이내) 또는 MA10 부근 (오차 2% 이내)으로 되돌림.
     - 조정 기간 거래량 < 5일 평균 거래량의 70% (거래량 감소 특징).
     - `analyze_trend` → volume_status가 거래량 감소를 표시해야 함.

  3. **반등 신호** (매매 철학 1: 엄격한 진입):
     - 현재 가격이 이동평균선 지지선을 유지.
     - MA5 이격률 < 2% — 최적 매수 구간.

  4. **확인 조건** (매매 철학 5: 리스크 점검):
     - `search_stock_news` 악재 없음.
     - 수급 분포 건강 (수익 비율 50-80%).

  평가 점수 조정:
  - 거래량 감소 MA5 되돌림: sentiment_score +10
  - 거래량 감소 MA10 되돌림이고 거래량 < 0.6배 평균: sentiment_score +8
  - 이상적 매수 포인트는 MA5 수준, 차선은 MA10.
  - 손절선은 MA20 수준.
  - `buy_reason`에 "거래량 감소 되돌림" 명시.
