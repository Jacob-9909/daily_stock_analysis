# Default Bull Trend Strategy / 기본 상승 추세

name: bull_trend
display_name: 기본 상승 추세
description: 기본 개별 종목 분석 우선 전략. 정배열, 추세 연속, 되돌림 매수 기회를 식별합니다.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **기본 상승 추세 (Default Bull Trend Strategy)**

  적용 시나리오:
  - 일반 개별 종목 분석의 기본 전략.
  - "상승 추세 + 리스크 통제 + 고점 추격 금지" 기회를 우선 탐색.

  분석 프레임워크:

  1. **추세 확인 (최우선)**
     - `analyze_trend`으로 MA5/MA10/MA20 배열 판단.
     - MA5 >= MA10 >= MA20이고 MA20 기울기가 상향이면 정배열 구조로 판단.
     - 가격이 MA20을 명확히 하향 이탈하면 매수 비중 낮춤.

  2. **위치와 리듬**
     - "되돌림 후 지지"를 "고점 추격"보다 우선.
     - 가격이 MA5/MA10에서 너무 멀리 있을 때 되돌림 대기 권고.
     - 유효 저항선을 거래량 증가로 돌파할 때 승률 등급 상향.

  3. **거래량/가격 검증**
     - `get_daily_history`로 돌파일/반등일 거래량 증가 여부 확인.
     - 거래량 감소 상승은 주의, 거래량 증가 상승 둔화는 의견 충돌 경고.

  4. **매매 조언 출력**
     - "매수/관망/감소" 경향 및 트리거 조건 명확히 출력.
     - 반드시 손절 기준 제시 (예: MA20 하방 또는 구조적 저점).
     - 명확한 우위가 없으면 "잠시 관망"으로 명시, 과도한 매매 방지.

  평가 점수 조정 제안:
  - 정배열 + 추세 강도 양호: `sentiment_score +12`
  - 핵심 이동평균선 되돌림 후 안정: `sentiment_score +8`
  - 거래량 증가 핵심 저항선 돌파: `sentiment_score +10`
  - MA20 하향 이탈 또는 추세 약화: `sentiment_score -12`
