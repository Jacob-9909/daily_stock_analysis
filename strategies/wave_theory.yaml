instructions: |
  **엘리어트 파동 이론 (Elliott Wave Theory)**

  핵심 원칙: 시장은 5파 충격 + 3파 조정의 사이클 구조로 움직입니다.

  ## 분석 단계

  ### 1. 현재 파동 유형 식별
  `get_daily_history`로 최근 120일 데이터 조회, `analyze_trend` 추세 데이터와 결합:

  **충격파 (1-3-5) 식별 특징**:
  - 제1파: 추세 전환의 첫 번째 파동, 거래량 온화하게 증가.
  - 제3파: 가장 강력한 충격파, 보통 거래량 증가, MACD 강세; 절대 가장 짧은 파동이 아님.
  - 제5파: 거래량이 보통 제3파보다 약함, 상단 배치 발생하면 상승 후 곧 종료.

  **조정파 (A-B-C) 식별 특징**:
  - A파: 첫 번째 하락, 거래량 비교적 많음, 대부분 조정으로 생각.
  - B파: 반등, 이전 상승 폭보다 약하고, 거래량 감소, 함정 리스크 높음.
  - C파: 두 번째 하락, 강도가 보통 A파를 초과, 조정 완료.

  ### 2. 황금 비율 위치 판단
  - 제2파 조정은 보통 제1파의 38.2%~61.8%.
  - 제3파 목표는 보통 제1파의 1.618~2.618배 연장.
  - 제4파는 제1파 가격 구간에 진입하면 안 됨 (파동 규칙 위반).
  - C파 목표: A파 고점에서 시작하여 A파 길이와 같거나 초과.

  ### 3. 최적 매수 포인트
  - **제2파 조정 안정** (황금 함정): 가장 안전한 매수 포인트, 손절선은 제1파 시작점.
  - **제4파 조정 안정**: 차선, 손절선은 제1파 고점.
  - **제3파 초기 돌파**: 거래량 증가로 제1파 고점을 돌파할 때.
  - 제5파 말단 고점 추격 방지 (상단 배치 리스크).

  ### 4. 리스크 경고
  - B파 반등은 큰 포지션 금지 (함정 성격).
  - 파동 계수는 주관성이 있으므로 다른 기술 지표와 결합하여 검증 필요.
  - 파동 규칙 위반 시 (예: 제4파가 제1파를 침범) 재계산 필요.

  ### 5. 출력 요구사항
  - 현재 가능한 파동 위치 제시 (예: "제3파 중간 구간" 또는 "제4파 조정 의심").
  - 핵심 피보나치 지지/저항선 제시 (0.382/0.618/1.618).
  - 현재 매수 시기인지, 대기인지, 회피인지 설명.
  - 파동 계수의 신뢰도 표시 (높음/중간/낮음).

  평가 점수 조정 제안:
  - 제2파 바닥 안정 (황금 함정): `sentiment_score +15`
  - 제3파 돌파 확인: `sentiment_score +12`
  - 제5파 말단/상단 배치: `sentiment_score -10`
  - C파 하락 중: `sentiment_score -12`
