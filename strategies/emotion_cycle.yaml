  - analyze_trend
  - search_stock_news

instructions: |
  **심리 사이클 전략 (Sentiment Cycle Strategy)**

  핵심 철학: 시장 참여자의 심리는 "공황→비관→의심→희망→낙관→흥분→탐욕→광기"
  사이클을 반복합니다. 스마트 머니는 공황 바닥에서 진입하고 광기 고점에서 이탈합니다.

  ## 심리 단계 정량 지표

  ### 1단계: 회전율 분석 (심리 열도 핵심 지표)
  `get_daily_history` 및 `get_realtime_quote` 사용:

  - **회전율 < 0.5%/일**: 시장 냉각, 관심 없음, 잠재적 바닥 구간 (남의 공황에 탐욕).
  - **회전율 0.5%~2%**: 정상 거래, 심리 안정.
  - **회전율 2%~5%**: 활발함, 시장 관심 시작, 고점 추격 금지.
  - **회전율 > 5%**: 높은 열도, 단타/개인투자자 유입, 심리 고점 주의.
  - **회전율 > 10% (일평균)**: 극도 과열, 보통 단기 고점.

  ### 2단계: 연속 회전율 추세
  `get_daily_history`로 최근 20일 회전율 추세 계산:
  - 높은 수준에서 낮아지는 추세 + 거래량 감소 → 심리 퇴조, 인내심 있게 대기.
  - 낮은 수준에서 높아지는 추세 + 거래량 급증 → 심리 시동, 진입 가능.
  - 갑작스러운 단일일 거래량 폭발 (회전율이 이전 5배 초과) → 보통 주력 출하, 주의 필요.

  ### 3단계: 뉴스 심리 분석
  `search_stock_news`으로 최근 뉴스 검색, 심리 경향 분석:
  - 뉴스에 "호재 실현, 실적 예상 초과, 상한가, 기관 추천" 집중 → 심리 과열 가능성.
  - 뉴스에 "실적 하락, 악재, 지지선 하향 이탈" 집중 → 비관적 심리가 바닥 형성 가능성.
  - 개인투자자 커뮤니티/SNS 심리 극도 부정적 → 역방향 지표, 바닥에 근접 가능성.

  ### 4단계: 이동평균선 수렴과 변동성
  `analyze_trend` 사용:
  - MA5/MA10/MA20 세 선 밀집 (이동평균선 수렴) → 에너지 축적, 방향 미결정, 심리 냉각.
  - 변동성이 낮은 수준으로 감소 (ATR 축소) → 심리 극도 침체, 에너지 폭발 전조.

  ## 심리 바닥 특징 (매수 구간)
  다음 3개 이상 충족:
  ✅ 최근 20일 회전율이 최근 1년 최저 수준
  ✅ 거래량 지속 감소, 최근 60일 평균 거래량의 50% 이하
  ✅ 최근 뉴스가 조용하거나 중립적 또는 부정적
  ✅ 주가가 MA20 부근 또는 이하이나 공황성 폭락은 없음
  ✅ 기관 보유 안정 또는 소폭 증가 (데이터가 있는 경우)

  ## 심리 고점 특징 (감소 구간)
  다음 3개 이상 충족:
  ⚠️ 최근 5일 회전율 > 최근 20일 평균의 2배
  ⚠️ 거래량 단일일 폭발적 증가
  ⚠️ 뉴스가 호재 실현, 기관 목표가 대폭 상향, 개인투자자 추격매수 중심
  ⚠️ 주가가 MA5에서 8% 이상 이격 (높은 이격률)
  ⚠️ MACD 상단 배치 발생

  ## 출력 요구사항
  - 현재 심리 단계 판단: 냉각 바닥 / 안정 / 상승 진입 / 과열 주의 / 광기 고점.
  - 현재 회전율과 최근 1년 회전율 평균 비교.
  - 심리 바닥 또는 고점 특징 충족 여부 (충족 항목 나열).
  - 역심리 매매 조언 제시 (대중이 공황할 때 탐욕, 대중이 탐욕할 때 주의).

  평가 점수 조정 제안:
  - 심리 바닥 특징 3개 이상 충족: `sentiment_score +14`
  - 심리 바닥 특징 전부 5개 충족: `sentiment_score +20`
  - 심리 고점 특징 3개 이상 충족: `sentiment_score -12`
  - 심리 고점 특징 전부 5개 충족: `sentiment_score -20`
  - 심리 안정 구간: 기본 점수 조정 없음
