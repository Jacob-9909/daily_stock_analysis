# Sentiment Cycle Strategy / 심리 사이클
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: 심리 사이클
description: 시장 심리, 회전율, 거래량/가격 구조를 기반으로 심리 저점(공황 바닥)과 심리 고점(열기 고점)을 식별하여 역심리 포지션을 구축합니다.
category: framework
