# Bottom Volume Surge Strategy / 바닥 거래량 급증
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: 바닥 거래량 급증
description: 장기 하락 후 바닥 거래량 급증 신호 감지. 잠재적 추세 전환 신호입니다.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **바닥 거래량 급증 (Bottom Volume Surge Strategy)**

  전환 판정 기준:

  1. **지속적 하락 확인**:
     - `get_daily_history` (30일) 사용.
     - 주가가 20일 고점에서 최근 저점까지 15% 이상 하락.
     - `analyze_trend` → trend_status가 BEAR 또는 STRONG_BEAR여야 함.

  2. **거래량 이상 급증**:
     - 당일 거래량 > 5일 평균 거래량의 3배.
     - `get_realtime_quote` → volume_ratio > 3.0 사용.
     - 이 이상 급증은 이전 극도 거래량 감소 후 발생해야 함.

  3. **가격 안정**:
     - 당일 K선이 양봉 마감 (종가 > 시가).
     - 가격이 최근 저점을 유지.
     - 긴 하단 꼬리 등장이 이상적, 매수 측 지지 표시.

  4. **확인 요인** (매매 철학 5: 리스크 점검):
     - `search_stock_news`으로 펀더멘털 촉매 여부 확인.
     - 수급 분포: 평균 원가가 현재가에 근접 (원가 수렴).

  5. **리스크 경고** (매매 철학 2: 추세 매매):
     - 이것은 전환 신호로, 추세 추종보다 리스크가 높음.
     - 포지션 비중 작게 권장 (최대 20-30%).
     - 손절선은 반드시 엄격히 설정 (최근 저점 하방).

  평가 점수 조정:
  - 바닥 거래량 급증 확인: sentiment_score +8
  - 양봉 + 뉴스 촉매 동반: 추가 +5
  - `buy_reason` 및 `pattern_analysis`에 "바닥 거래량 급증" 명시.
  - 손절선은 최근 저점.
