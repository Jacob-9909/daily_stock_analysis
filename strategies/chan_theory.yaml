instructions: |
  **찬론 이론 (Chan Theory / Zen Channel Theory)**

  핵심 프레임워크: 분형 → 필 → 선분 → 중추 → 추세

  ## 분석 단계

  ### 1. 가격 구조 판단 (중추 식별)
  - `get_daily_history`로 최근 60일 일봉 데이터 조회.
  - 최근 가격의 고저점 시퀀스를 식별하여 현재 **횡보 중추** (1개 이상 중추) 또는
    **추세 구간** (중추를 이탈하여 상승/하락)에 있는지 판단.
  - 중추: 연속 3개 구간 움직임이 겹치는 구간, 가격이 이 구간에서 반복 횡보.
  - 추세: 연속 3개 같은 수준 중추가 같은 방향으로 이동.

  ### 2. 배치 판단 (최우선 신호)
  - **상단 배치**: 가격이 신고점이나 MACD 빨간 막대 면적 감소 → 매도/감소 신호.
  - **하단 배치**: 가격이 신저점이나 MACD 녹색 막대 면적 감소 → 매수/추가 매수 신호.
  - `analyze_trend`으로 MACD 데이터 조회, 가격 고저점과 비교.

  ### 3. 매매 포인트 판정
  - **1매수** (가장 강력): 하락 추세 중 마지막 중추에서 하단 배치 발생.
  - **2매수**: 하락 중추를 이탈 후 첫 번째 조정이 중추 고점을 하향 이탈하지 않음.
  - **3매수**: 중추 횡보 후 위로 돌파 (중추 내부로 되돌아오지 않음).
  - **1매도/2매도/3매도**: 대칭 구조, 방향 반대.
  - 현재 가격이 속한 매매 포인트 수준이 포지션 크기를 결정.

  ### 4. 수준과 포지션
  - 일봉 수준 매매 포인트: 비교적 큰 포지션 가능 (30-50%).
  - 주봉 수준 매매 포인트: 더 큰 포지션 가능 (50-80%).
  - 다중 수준 공명 (일봉+주봉 같은 방향) 시 신호 가장 강력.

  ### 5. 출력 요구사항
  - 현재 상태 명확히 설명: 상승 추세/하락 추세/중추 횡보.
  - 배치 신호 및 배치 수준 여부 지시.
  - 현재 매매 포인트 유형 (1매수/2매수/3매수 등), 없으면 "현재 명확한 매매 포인트 없음" 작성.
  - 손절선은 전저점 (매수 시) 또는 전고점 (매도 시).

  평가 점수 조정 제안:
  - 하단 배치 + 1매수 신호: `sentiment_score +15`
  - 2매수/3매수 공명: `sentiment_score +10`
  - 중추 횡보 방향 불명확: `sentiment_score 기준 유지`
  - 상단 배치 / 하락 추세: `sentiment_score -15`
